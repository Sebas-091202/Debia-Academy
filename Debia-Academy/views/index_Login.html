<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEBIA Academy</title>
<link rel="stylesheet" href="../css/login.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- LADO IZQUIERDO -->
    <div class="left">
        <img src="../img/debia-academy-blanco.png" class="logo">
        <h2>DEBIA Academy</h2>
        <p>Capacitación profesional segura</p>
    </div>

    <!-- LADO DERECHO -->
    <div class="right">

        <!-- LOGIN -->
        <form id="loginForm" class="form active" action="../controller/login.php" method="POST">
            <h2>Iniciar Sesión</h2>

            <div class="input">
                <i class='bx bx-envelope'></i>
                <input type="email" name="correo" placeholder="Correo" required>
            </div>

            <div class="input">
                <i class='bx bx-lock'></i>
                <input type="password" name="contrasena" placeholder="Contraseña" required>
            </div>

            <button type="submit">Ingresar</button>

            <div class="switch">Crear cuenta</div>
        </form>

        <!-- REGISTRO -->
        <form id="registerForm" class="form" action="../controller/register.php" method="POST">

            <h2>Registro</h2>

            <div class="input">
                <i class='bx bx-user'></i>
                <input type="text" name="nombre" placeholder="Nombre completo" required>
            </div>

            <div class="input">
                <i class='bx bx-id-card'></i>
                <select name="tipo_documento" required>
                    <option value="">Tipo documento</option>
                    <option>Cédula</option>
                    <option>Pasaporte</option>
                </select>
            </div>

            <div class="input">
                <i class='bx bx-hash'></i>
                <input type="number" name="numero_identificacion" placeholder="Número identificación" required>
            </div>

            <div class="input">
                <i class='bx bx-envelope'></i>
                <input type="email" name="correo" placeholder="Correo" required>
            </div>

            <div class="input">
                <i class='bx bx-briefcase'></i>
                <select name="area" required>
                    <option value="">Área</option>
                    <option>Investigaciones Privadas</option>
                    <option>Visitas Domiciliarias</option>
                    <option>Poligrafía</option>
                    <option>Validación Académica</option>
                    <option>Asesoría Jurídica</option>
                </select>
            </div>

            <div class="input">
                <i class='bx bx-lock'></i>
                <input type="password" name="contrasena" placeholder="Contraseña" required>
            </div>

            <button type="submit">Registrarse</button>

            <div class="switch">Ya tengo cuenta</div>

        </form>

    </div>

</div>

<script src="../js/login.js"></script>

</body>
</html>
